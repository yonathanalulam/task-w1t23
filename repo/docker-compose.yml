name: ${COMPOSE_PROJECT_NAME:-rrga_${USER:-local}}

services:
  runtime-init:
    image: alpine:3.20
    command: ["sh", "/bootstrap_runtime_files.sh"]
    volumes:
      - runtime_state:/run/rrga-runtime
      - ./scripts/bootstrap_runtime_files.sh:/bootstrap_runtime_files.sh:ro

  db:
    image: postgres:16
    depends_on:
      runtime-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER_FILE: /run/rrga-runtime/db_user
      POSTGRES_PASSWORD_FILE: /run/rrga-runtime/db_password
      POSTGRES_DB_FILE: /run/rrga-runtime/db_name
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$(cat /run/rrga-runtime/db_user)\" -d postgres"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data
      - runtime_state:/run/rrga-runtime:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      runtime-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      PGHOST: ${RRGA_DB_HOST:-db}
      PGPORT: ${RRGA_DB_PORT:-5432}
      PGUSER_FILE: /run/rrga-runtime/db_user
      PGPASSWORD_FILE: /run/rrga-runtime/db_password
      PGDATABASE_FILE: /run/rrga-runtime/db_name
      LOG_LEVEL: info
      APP_SESSION_SECRET_FILE: /run/rrga-runtime/app_session_secret
      APP_ENCRYPTION_KEY_FILE: /run/rrga-runtime/app_encryption_key
    command: bash -lc "./init_db.sh && npm run dev -w @rrga/api"
    expose:
      - "3000"
    volumes:
      - runtime_state:/run/rrga-runtime:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 4173
      ORIGIN: http://localhost
      API_INTERNAL_BASE_URL: http://api:3000/api/v1
      PUBLIC_API_BASE_URL: http://api:3000/api/v1
    command: bash -lc "npm run dev -w @rrga/web"
    ports:
      - target: 4173
        published: ${APP_PORT:-0}
        host_ip: 127.0.0.1

volumes:
  pg_data:
  runtime_state:
